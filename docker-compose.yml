services:
  spacy-sm:
    build:
      context: ./spacy
      dockerfile: Dockerfile
    environment:
      - SPACY_MODEL=zh_core_web_sm
    ports:
      - "8001:8000"
    mem_limit: 1g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  spacy-lg:
    build:
      context: ./spacy
      dockerfile: Dockerfile
    environment:
      - SPACY_MODEL=zh_core_web_lg
    ports:
      - "8002:8000"
    mem_limit: 4g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
